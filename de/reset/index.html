<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitnessLady - Passwort zurücksetzen</title>
<meta name="theme-color" content="#0b0613">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif}
body{background:linear-gradient(180deg,#0b0613,#14071c);color:white;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:20px;font-weight:600}
.brand{display:flex;align-items:center;gap:8px;font-size:18px}
.brand-dot{width:10px;height:10px;border-radius:50%;background:#ff4fd8}
.back{color:#ccc;text-decoration:none;font-size:14px}
.container{flex:1;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:40px;max-width:420px;width:100%;backdrop-filter:blur(20px)}
h1{font-size:42px;margin-bottom:20px}
.desc{color:#cfcfcf;margin-bottom:30px;line-height:1.5}
label{display:block;margin-bottom:8px;margin-top:15px}
input{width:100%;padding:14px;border-radius:12px;border:none;background:rgba(255,255,255,0.08);color:white;font-size:14px}
button{margin-top:20px;padding:14px 24px;border:none;border-radius:25px;background:linear-gradient(90deg,#ff4fd8,#b14cff);color:white;font-weight:bold;cursor:pointer;width:100%}
button:disabled{opacity:.6;cursor:not-allowed}
.status{display:none;margin-bottom:18px;padding:12px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.status.show{display:block}
.status.ok{background:rgba(125,255,179,.14);color:#dfffea;border:1px solid rgba(125,255,179,.22)}
.status.err{background:rgba(255,143,143,.12);color:#ffe2e2;border:1px solid rgba(255,143,143,.22)}
.footer{display:flex;justify-content:space-between;padding:20px;font-size:12px;color:#888}
@media (max-width:640px){h1{font-size:34px}.card{padding:26px 18px}.topbar{padding:16px;gap:12px;flex-wrap:wrap}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><div class="brand-dot"></div>FitnessLady</div>
  <a class="back" href="/de/login/">← Zurück zum Login</a>
</div>

<div class="container">
  <div class="card">
    <h1>Passwort zurücksetzen</h1>
    <p class="desc">Gib dein neues Passwort ein und speichere es. Danach kannst du dich auf der Login-Seite anmelden.</p>
    <div id="status" class="status"></div>
    <label for="newPass">Neues Passwort</label>
    <input id="newPass" type="password" placeholder="Neues Passwort">
    <label for="newPass2">Neues Passwort wiederholen</label>
    <input id="newPass2" type="password" placeholder="Neues Passwort wiederholen">
    <button id="saveBtn" type="button">Speichern</button>
  </div>
</div>

<div class="footer">
  <div>© 2026 FitnessLady</div>
  <div>Tüske web design</div>
</div>

<script type="module">
  import { confirmPasswordReset, getAuth } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import "../shared/firebase.js";

  const params = new URLSearchParams(window.location.search);
  const oobCode = params.get("oobCode");
  const newPassInput = document.getElementById("newPass");
  const newPass2Input = document.getElementById("newPass2");
  const saveBtn = document.getElementById("saveBtn");
  const statusBox = document.getElementById("status");

  function showStatus(message, type = "err"){
    statusBox.textContent = message;
    statusBox.className = `status show ${type}`;
  }

  async function doReset(){
    const newPass = (newPassInput.value || "").trim();
    const newPass2 = (newPass2Input.value || "").trim();

    if(!oobCode){
      showStatus("Der Link zum Zurücksetzen ist ungültig oder unvollständig.", "err");
      return;
    }
    if(!newPass || !newPass2){
      showStatus("Bitte gib das neue Passwort zweimal ein.", "err");
      return;
    }
    if(newPass.length < 6){
      showStatus("Das Passwort muss mindestens 6 Zeichen lang sein.", "err");
      newPassInput.focus();
      return;
    }
    if(newPass !== newPass2){
      showStatus("Die beiden Passwörter stimmen nicht überein.", "err");
      newPass2Input.focus();
      return;
    }

    saveBtn.disabled = true;
    try{
      const auth = getAuth();
      await confirmPasswordReset(auth, oobCode, newPass);
      showStatus("Das Passwort wurde erfolgreich gespeichert. Weiterleitung zum Login...", "ok");
      setTimeout(() => { window.location.href = "/de/login/"; }, 1800);
    }catch(e){
      const msg = String(e?.code || e?.message || "").toLowerCase();
      if(msg.includes("expired") || msg.includes("invalid")){
        showStatus("Der Reset-Link ist abgelaufen oder ungültig. Bitte fordere einen neuen Link an.", "err");
      } else {
        showStatus("Das Passwort konnte gerade nicht gespeichert werden. Bitte versuche es erneut.", "err");
      }
      saveBtn.disabled = false;
    }
  }

  saveBtn.addEventListener("click", doReset);
  newPass2Input.addEventListener("keydown", (e) => { if(e.key === "Enter") doReset(); });
</script>
</body>
</html>
