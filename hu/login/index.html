<!-- FILE: /hu/login/index.html -->
<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FitnessLady Login</title>
  <meta name="robots" content="noindex" />

  <!-- ✅ PWA / iOS -->
  <meta name="theme-color" content="#07060b" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitnessLady" />
  <!-- loginból az app ikon -->
  <link rel="apple-touch-icon" href="../app/icons/apple-touch-icon.png" />

  <!-- opcionális: manifest (iOS-n nem kötelező, de jó) -->
  <link rel="manifest" href="../app/manifest.webmanifest" />

  <!-- extra fallback ikonok -->
  <link rel="icon" type="image/png" sizes="192x192" href="../app/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="../app/icons/icon-512.png" />

  <style>
    :root{
      --bg:#07060b;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --muted2:rgba(255,255,255,.55);
      --pink:#ff4fd8;
      --pink2:#b14cff;
      --gold:#ffd38a;

      --stroke: rgba(255,255,255,.10);
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --radius:22px;
      --max: 980px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,79,216,.10), transparent 60%),
        radial-gradient(1000px 700px at 85% 25%, rgba(177,76,255,.10), transparent 62%),
        radial-gradient(900px 520px at 55% 90%, rgba(255,211,138,.07), transparent 55%),
        var(--bg);
      background-attachment: fixed;
    }

    .container{ width:min(var(--max), 92vw); margin:0 auto; padding: 18px 0 44px; }
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding: 14px 0;
    }
    .brand{ display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:.2px; }
    .dot{
      width:10px;height:10px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #ffd0f6, var(--pink));
      box-shadow: 0 0 18px rgba(255,79,216,.7);
    }

    .pill{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(20,12,26,.55);
      color: var(--text);
      box-shadow: 0 12px 34px rgba(0,0,0,.35);
      cursor:pointer;
      user-select:none;
      white-space: nowrap;
      gap:8px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .pill:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.20); background: rgba(255,255,255,.07); }
    .pill.primary{
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      color:#140813;
      border-color: rgba(255,255,255,.18);
      font-weight: 900;
    }
    .pill:disabled{ opacity:.6; cursor:not-allowed; transform:none !important; }

    .card{
      margin-top: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 16px;
    }

    h1{
      margin: 0 0 8px;
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      letter-spacing: -.3px;
      font-size: 40px;
    }
    .sub{ margin:0 0 14px; color: var(--muted); line-height:1.6; }

    label{ display:block; margin: 10px 0 6px; color: rgba(255,255,255,.72); font-weight:800; }
    input{
      width:100%;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline: none;
      font-size: 15px;
    }
    input:focus{
      border-color: rgba(255,79,216,.35);
      box-shadow: 0 0 0 4px rgba(255,79,216,.12);
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 14px;
      align-items:center;
    }

    .link-btn{
      padding: 0;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.82);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .link-btn:hover{ color:#fff; }

    footer{
      margin-top: 16px;
      padding: 14px 0 0;
      display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
      color: rgba(255,255,255,.70);
      font-size: 13px;
    }

    @media (prefers-reduced-motion: reduce){
      .pill{ transition:none; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top">
      <div class="brand"><span class="dot"></span><span>FitnessLady Login</span></div>
      <a class="pill" id="btnBack" href="#">← Vissza</a>
    </div>

    <div class="card">
      <h1>Bejelentkezés</h1>
      <p class="sub">E-mail + jelszó. Belépés után automatikusan a Saját programodba / Adminba visz.</p>

      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" placeholder="email@domain.com" />

      <label for="pass">Jelszó</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />

      <div class="row">
        <button class="pill primary" id="btnLogin" type="button">Belépés</button>
        <button class="link-btn" id="btnForgot" type="button">Elfelejtett jelszó</button>
      </div>
    </div>

    <footer>
      <div>© <span id="y"></span> FitnessLady</div>
      <div>Tüske web design</div>
    </footer>
  </div>

  <script type="module">
    const $ = (s) => document.querySelector(s);

    $("#y").textContent = new Date().getFullYear();

    function getReadableError(e){
      return e?.message || "Ismeretlen hiba";
    }

    async function sendResetViaFallback(email){
      const authModule = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");
      const fb = await import("../shared/firebase.js");
      const auth =
        fb.auth ||
        fb.firebaseAuth ||
        fb.getAuthInstance?.() ||
        fb.getAuth?.();

      if (!auth) {
        throw new Error("Nem található Firebase Auth példány a shared/firebase.js-ben.");
      }

      await authModule.sendPasswordResetEmail(auth, email);
    }

    try{
      const fb = await import("../shared/firebase.js");

      $("#btnBack").href = `${fb.BASE_PREFIX}/hu/`;

      async function routeAfterLogin(user){
        try{
          const ud = await fb.ensureUserDoc(user.uid, user.email || "");
          const role = (await fb.getUserRole(user.uid)) || ud?.role || "user";
          if(String(role).toLowerCase() === "admin" || fb.isAdminEmail(user.email || "")){
            fb.toAdmin("hu");
          }else{
            fb.toApp("hu");
          }
        }catch{
          fb.toApp("hu");
        }
      }

      async function doLogin(){
        const email = ($("#email").value || "").trim();
        const pass  = ($("#pass").value || "");

        if(!email || !pass) return;

        const btn = $("#btnLogin");
        btn.disabled = true;

        try{
          const cred = await fb.loginEmailPassword(email, pass);
          await routeAfterLogin(cred.user);
        }catch{
          btn.disabled = false;
        }
      }

      async function doForgotPassword(){
        const email = ($("#email").value || "").trim();

        if(!email){
          alert("Írd be az e-mail címedet a jelszó visszaállításához.");
          $("#email").focus();
          return;
        }

        const btn = $("#btnForgot");
        btn.disabled = true;

        try{
          if (typeof fb.sendPasswordResetEmail === "function") {
            await fb.sendPasswordResetEmail(email);
          } else if (typeof fb.resetPassword === "function") {
            await fb.resetPassword(email);
          } else if (typeof fb.resetPasswordEmail === "function") {
            await fb.resetPasswordEmail(email);
          } else if (typeof fb.sendResetEmail === "function") {
            await fb.sendResetEmail(email);
          } else {
            await sendResetViaFallback(email);
          }

          alert("Elküldtük a jelszó-visszaállító e-mailt.");
        } catch (e) {
          alert("A jelszó-visszaállítás most nem sikerült. Kérlek próbáld újra később.");
          console.error("Forgot password error:", getReadableError(e), e);
        } finally {
          btn.disabled = false;
        }
      }

      $("#btnLogin").addEventListener("click", doLogin);
      $("#btnForgot").addEventListener("click", doForgotPassword);
      $("#pass").addEventListener("keydown", (e)=>{ if(e.key === "Enter") doLogin(); });

      fb.onAuth(async (user)=>{
        if(user){
          await routeAfterLogin(user);
        }
      });

    }catch(e){
      console.error("Login module error:", e);
    }
  </script>
</body>
</html>
