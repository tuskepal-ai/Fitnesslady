<!-- FILE: /hu/reset/index.html -->
<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FitnessLady – Jelszó visszaállítás</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#07060b" />

  <style>
    :root{
      --bg:#07060b;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --pink:#ff4fd8;
      --pink2:#b14cff;
      --stroke:rgba(255,255,255,.10);
      --shadow:0 18px 55px rgba(0,0,0,.55);
      --radius:22px;
      --max:980px;
      --ok:#7dffbf;
      --err:#ff7b96;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,79,216,.10), transparent 60%),
        radial-gradient(1000px 700px at 85% 25%, rgba(177,76,255,.10), transparent 62%),
        radial-gradient(900px 520px at 55% 90%, rgba(255,211,138,.07), transparent 55%),
        var(--bg);
      background-attachment: fixed;
    }

    .container{
      width:min(var(--max),92vw);
      margin:0 auto;
      padding:18px 0 44px;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .dot{
      width:10px;height:10px;border-radius:999px;
      background:radial-gradient(circle at 30% 30%, #ffd0f6, var(--pink));
      box-shadow:0 0 18px rgba(255,79,216,.7);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(20,12,26,.55);
      color:var(--text);
      box-shadow:0 12px 34px rgba(0,0,0,.35);
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      gap:8px;
      transition:transform .18s ease,border-color .18s ease,background .18s ease;
      text-decoration:none;
    }

    .pill:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,.20);
      background:rgba(255,255,255,.07);
    }

    .pill.primary{
      background:linear-gradient(135deg,var(--pink),var(--pink2));
      color:#140813;
      border-color:rgba(255,255,255,.18);
      font-weight:900;
    }

    .pill:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none !important;
    }

    .card{
      margin-top:10px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      padding:16px;
    }

    h1{
      margin:0 0 8px;
      font-family:ui-serif,Georgia,"Times New Roman",Times,serif;
      letter-spacing:-.3px;
      font-size:40px;
    }

    .sub{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.6;
    }

    label{
      display:block;
      margin:10px 0 6px;
      color:rgba(255,255,255,.72);
      font-weight:800;
    }

    input{
      width:100%;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      outline:none;
      font-size:15px;
    }

    input:focus{
      border-color:rgba(255,79,216,.35);
      box-shadow:0 0 0 4px rgba(255,79,216,.12);
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
      align-items:center;
    }

    .msg{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.25);
      color:rgba(255,255,255,.90);
      display:none;
      line-height:1.5;
      white-space:pre-wrap;
    }

    .msg.ok{
      display:block;
      border-color:rgba(125,255,191,.35);
    }

    .msg.err{
      display:block;
      border-color:rgba(255,123,150,.35);
    }

    footer{
      margin-top:16px;
      padding:14px 0 0;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      color:rgba(255,255,255,.70);
      font-size:13px;
    }

    @media (prefers-reduced-motion: reduce){
      .pill{transition:none}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="brand"><span class="dot"></span><span>FitnessLady</span></div>
      <a class="pill" id="btnBack" href="/hu/login/">← Vissza a belépéshez</a>
    </div>

    <div class="card">
      <h1>Jelszó visszaállítás</h1>
      <p class="sub">Add meg az új jelszavadat, majd mentsd el. Ezután a belépési oldalon be tudsz jelentkezni.</p>

      <label for="pass1">Új jelszó</label>
      <input id="pass1" type="password" autocomplete="new-password" placeholder="Új jelszó" />

      <label for="pass2">Új jelszó újra</label>
      <input id="pass2" type="password" autocomplete="new-password" placeholder="Új jelszó újra" />

      <div class="row">
        <button class="pill primary" id="btnSave" type="button">Mentés</button>
      </div>

      <div class="msg" id="msgBox"></div>
    </div>

    <footer>
      <div>© <span id="y"></span> FitnessLady</div>
      <div>Tüske web design</div>
    </footer>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {
      getAuth,
      verifyPasswordResetCode,
      confirmPasswordReset
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBl2MzyiRzgCzeg-eEWNHkc9Vxx-PgawfU",
      authDomain: "fitneady-15fd0.firebaseapp.com",
      projectId: "fitneady-15fd0",
      storageBucket: "fitneady-15fd0.firebasestorage.app",
      messagingSenderId: "480597492603",
      appId: "1:480597492603:web:2ba6c266c662b4c79e33de",
      measurementId: "G-MH1YK9C2YF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = "hu";

    const $ = (s) => document.querySelector(s);
    const msgBox = $("#msgBox");
    $("#y").textContent = new Date().getFullYear();

    function show(text, kind = "ok"){
      msgBox.className = "msg " + kind;
      msgBox.style.display = "block";
      msgBox.textContent = text;
    }

    function getParam(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }

    const mode = getParam("mode");
    const oobCode = getParam("oobCode");

    $("#btnBack").href = "/hu/login/";

    async function init(){
      if (!mode || !oobCode) {
        show("Érvénytelen vagy hiányzó jelszó-visszaállító link.", "err");
        $("#btnSave").disabled = true;
        return;
      }

      if (mode !== "resetPassword") {
        show("Ez a link nem jelszó-visszaállításhoz tartozik.", "err");
        $("#btnSave").disabled = true;
        return;
      }

      try {
        await verifyPasswordResetCode(auth, oobCode);
      } catch (e) {
        show("A jelszó-visszaállító link lejárt vagy érvénytelen.", "err");
        $("#btnSave").disabled = true;
      }
    }

    async function doReset(){
      const pass1 = ($("#pass1").value || "").trim();
      const pass2 = ($("#pass2").value || "").trim();

      if (!pass1 || !pass2) {
        show("Kérlek töltsd ki mindkét mezőt.", "err");
        return;
      }

      if (pass1.length < 6) {
        show("Az új jelszó legyen legalább 6 karakter hosszú.", "err");
        return;
      }

      if (pass1 !== pass2) {
        show("A két jelszó nem egyezik.", "err");
        return;
      }

      const btn = $("#btnSave");
      btn.disabled = true;

      try {
        await confirmPasswordReset(auth, oobCode, pass1);
        show("A jelszavad sikeresen megváltozott. Most már be tudsz jelentkezni.", "ok");
        setTimeout(() => {
          window.location.href = "/hu/login/";
        }, 1800);
      } catch (e) {
        show("A jelszó visszaállítása nem sikerült. Kérj új visszaállító emailt.", "err");
        btn.disabled = false;
      }
    }

    $("#btnSave").addEventListener("click", doReset);
    $("#pass2").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doReset();
    });

    init();
  </script>
</body>
</html>
