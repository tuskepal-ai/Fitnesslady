<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitnessLady – Jelszó visszaállítás</title>

<meta name="theme-color" content="#0b0613">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(180deg,#0b0613,#14071c);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-weight:600;
}

.brand{
display:flex;
align-items:center;
gap:8px;
font-size:18px;
}

.brand-dot{
width:10px;
height:10px;
border-radius:50%;
background:#ff4fd8;
}

.back{
color:#ccc;
text-decoration:none;
font-size:14px;
}

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:40px;
max-width:420px;
width:100%;
backdrop-filter:blur(20px);
}

h1{
font-size:42px;
margin-bottom:20px;
}

.desc{
color:#cfcfcf;
margin-bottom:30px;
line-height:1.5;
}

label{
display:block;
margin-bottom:8px;
margin-top:15px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
}

button{
margin-top:20px;
padding:14px 24px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#ff4fd8,#b14cff);
color:white;
font-weight:bold;
cursor:pointer;
}

.footer{
display:flex;
justify-content:space-between;
padding:20px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="topbar">

<div class="brand">
<div class="brand-dot"></div>
FitnessLady
</div>

<a class="back" href="/hu/login/">← Vissza a belépéshez</a>

</div>


<div class="container">

<div class="card">

<h1>Jelszó visszaállítás</h1>

<p class="desc">
Add meg az új jelszavadat, majd mentsd el.  
Ezután a belépési oldalon be tudsz jelentkezni.
</p>

<label>Új jelszó</label>
<input type="password" placeholder="Új jelszó">

<label>Új jelszó újra</label>
<input type="password" placeholder="Új jelszó újra">

<button>Mentés</button>

</div>

</div>

<div class="footer">

<div>© 2026 FitnessLady</div>

<div>Tüske web design</div>

</div>

</body>
</html>
